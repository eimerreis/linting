name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Setup npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Detect pending changesets
        id: detect
        shell: bash
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          count=0
          for file in "${files[@]}"; do
            if [[ "$(basename "$file")" != "README.md" ]]; then
              count=$((count + 1))
            fi
          done

          if ((count > 0)); then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $count changeset file(s)."
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets found. Skipping release."
          fi

      - name: Validate package
        if: steps.detect.outputs.has_changesets == 'true'
        run: npm run lint && npm run format:check

      - name: Version package with changesets
        if: steps.detect.outputs.has_changesets == 'true'
        run: npm run version-packages

      - name: Publish to npm via trusted publishing
        if: steps.detect.outputs.has_changesets == 'true'
        run: npm run release

      - name: Commit version changes
        if: steps.detect.outputs.has_changesets == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore: version packages"
          git push
